# copied from https://github.com/marketplace/actions/gradle-dependency-submission

name: Check dependencies

on:
  push:
      branches:
          - dependy

jobs:
  build:
    name: Dependencies
    runs-on: ubuntu-latest
    permissions: # The Dependency Submission API requires write permission
      contents: write
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v3

      - name: Run snapshot action
        uses: mikepenz/gradle-dependency-submission@0.8.6
